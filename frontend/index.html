<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      (function(l) {
        if (l.search[1] === 'p') {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&') 
          }).filter(function(v) {
            return v.slice(0, 1) === 'p'
          })[0].slice(2);
          if (decoded !== l.pathname.slice(l.pathname.lastIndexOf('/') + 1)) {
            window.history.replaceState(null, null,
                l.pathname.slice(0, l.pathname.lastIndexOf('/') + 1) + decoded + (l.search.slice(1).split('&').filter(function(v) {
                  return v.slice(0, 1) !== 'p'
                }).length ? '?' + l.search.slice(1).split('&').filter(function(v) {
                  return v.slice(0, 1) !== 'p'
                }).join('&').replace(/&/g, '~and~') : '') + l.hash
            );
          }
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
